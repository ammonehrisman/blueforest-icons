<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- BlueForest Design System icon: swatch fan deck, one blue accent chip, black-outline family style -->
  <!-- back chip (white, fanned left) -->
  <rect x="211" y="96" width="90" height="290" rx="20"
        fill="#FFFFFF" stroke="#000000" stroke-width="28" stroke-linejoin="round"
        transform="rotate(-32 256 386)"/>
  <!-- middle chip (white, upright) -->
  <rect x="211" y="82" width="90" height="304" rx="20"
        fill="#FFFFFF" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
  <!-- middle chip color block -->
  <rect x="233" y="108" width="46" height="46" rx="10" fill="#000000"/>
  <!-- front chip (blue accent, fanned right, drawn last) -->
  <rect x="211" y="96" width="90" height="290" rx="20"
        fill="#009FE0" stroke="#000000" stroke-width="28" stroke-linejoin="round"
        transform="rotate(32 256 386)"/>
  <!-- pivot bolt -->
  <circle cx="256" cy="386" r="34" fill="#FFFFFF" stroke="#000000" stroke-width="28"/>
</svg>
