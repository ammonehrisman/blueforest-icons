<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Envelope body: white fill, black outline -->
  <rect x="150" y="256" width="724" height="512" rx="72" fill="#FFFFFF" stroke="#000000" stroke-width="60" stroke-linejoin="round"/>
  <!-- Inner flap: open V from top corners to center -->
  <path d="M186 300 L512 556 L838 300" fill="none" stroke="#000000" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- BLUE 6-point snowflake over the center -->
  <g stroke="#009FE0" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- three crossing axes -->
    <line x1="512" y1="416" x2="512" y2="668"/>
    <line x1="403" y1="479" x2="621" y2="605"/>
    <line x1="403" y1="605" x2="621" y2="479"/>
    <!-- branch ticks on vertical axis -->
    <path d="M482 452 L512 482 L542 452"/>
    <path d="M482 632 L512 602 L542 632"/>
    <!-- branch ticks on the two diagonal ends -->
    <path d="M403 445 L403 479 L437 479"/>
    <path d="M621 639 L621 605 L587 605"/>
    <path d="M403 639 L403 605 L437 605"/>
    <path d="M621 445 L621 479 L587 479"/>
  </g>
</svg>
