  <line x1="420" y1="672" x2="392" y2="792" stroke="#000000" stroke-width="44" stroke-linecap="round"/>
  <line x1="490" y1="712" x2="470" y2="836" stroke="#000000" stroke-width="44" stroke-linecap="round"/>
  <line x1="562" y1="738" x2="552" y2="864" stroke="#000000" stroke-width="44" stroke-linecap="round"/>
