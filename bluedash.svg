  <!-- Tick marks around the dial -->
  <line x1="512" y1="200" x2="512" y2="252" stroke="#000000" stroke-width="44" stroke-linecap="round"/>
  <line x1="304" y1="286" x2="340" y2="323" stroke="#000000" stroke-width="44" stroke-linecap="round"/>
  <line x1="720" y1="286" x2="684" y2="323" stroke="#000000" stroke-width="44" stroke-linecap="round"/>
  <line x1="720" y1="594" x2="684" y2="557" stroke="#000000" stroke-width="44" stroke-linecap="round"/>
  <!-- Needle pointing up-and-right from hub -->
  <line x1="512" y1="628" x2="662" y2="420" stroke="#000000" stroke-width="52" stroke-linecap="round"/>
  <!-- Center hub dot -->
  <circle cx="512" cy="628" r="52" fill="#000000"/>
